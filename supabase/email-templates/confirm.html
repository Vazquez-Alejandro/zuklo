<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmá tu cuenta - Zuklo</title>
</head>
<body style="margin:0;padding:0;background-color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0f172a;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="background-color:#1e293b;border-radius:16px;border:1px solid #334155;padding:40px;">
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <span style="font-size:32px;font-weight:bold;color:#34d399;">Zuklo</span>
            </td>
          </tr>
          <tr>
            <td style="padding-bottom:16px;">
              <h1 style="margin:0;font-size:24px;color:#f8fafc;text-align:center;">Confirmá tu cuenta</h1>
            </td>
          </tr>
          <tr>
            <td style="padding-bottom:32px;">
              <p style="margin:0;font-size:16px;color:#94a3b8;text-align:center;line-height:1.6;">
                Gracias por registrarte en Zuklo. Hacé clic en el botón para confirmar tu cuenta y empezar a buscar propiedades.
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;background-color:#10b981;color:#ffffff;font-size:16px;font-weight:600;text-decoration:none;padding:14px 40px;border-radius:12px;">
                Confirmar cuenta
              </a>
            </td>
          </tr>
          <tr>
            <td style="padding-bottom:24px;">
              <p style="margin:0;font-size:14px;color:#64748b;text-align:center;">
                Si no creaste esta cuenta, ignorá este email.
              </p>
            </td>
          </tr>
          <tr>
            <td style="border-top:1px solid #334155;padding-top:24px;">
              <p style="margin:0;font-size:12px;color:#475569;text-align:center;">
                Zuklo — Encontrá tu próximo alquiler<br/>
                © 2026 Zuklo. Todos los derechos reservados.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
